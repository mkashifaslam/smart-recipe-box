<div class="recipe-counter">
  <h1>Recipe Counter</h1>
  <div class="counter-section">
    <p class="label">Currently, you have</p>
    <span class="counter">{{ count() }}</span>
    <p class="label">{{ count() > 1 ? 'recipes' : 'recipe' }} in your collection.</p>
  </div>
  <p class="motivation-message">{{ motivationMessage() }}</p>
  <div class="buttons">
    <button class="add-recipe" (click)="addRecipe()">Add Recipe</button>
    <button
      class="remove-recipe"
      (click)="removeRecipe()"
      [attr.disabled]="count() === 0 ? 'disabled' : null"
    >
      Remove Recipe
    </button>
  </div>
</div>
