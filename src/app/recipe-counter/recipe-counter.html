<div class="recipe-counter">
  <h1>Recipe Counter</h1>
  <p class="label">
    Currently, you have <span class="counter">{{ count() }}</span> {{ count() > 1 ? 'recipes' : 'recipe' }} in your
    collection.<br/>
    {{ motivationMessage() }}</p>
  <div class="buttons">
    <button
      class="add-recipe"
      (click)="addRecipe()"
    >
      Add Recipe
    </button>
    <button
      class="remove-recipe"
      (click)="removeRecipe()"
      [attr.disabled]="count() === 0 ? 'disabled' : null"
    >
      Remove Recipe
    </button>
  </div>
</div>
