<div class="recipe-list">
  <h1>Recipe List</h1>
  <div>
    <ul>
      @for (recipe of recipes(); track recipe.id) {
        <li class="recipe-item">
          <a href="#">{{ recipe.name }}</a>
          <br/>
          <p>{{ recipe.description }}</p>
        </li>
      }
    </ul>
  </div>
</div>
